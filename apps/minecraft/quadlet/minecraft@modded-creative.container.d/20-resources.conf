[Container]
# NeoForge requires Java 21 (jdk.crypto.ec module missing from java25 JRE)
Image=minecraft-server-java21.image
Memory=7g
PidsLimit=8192
StopTimeout=190
# Podman >= 5.9: use CgroupConf= key directly:
#   CgroupConf=memory.swap.max=0
#   CgroupConf=memory.high=6300000000
#   CgroupConf=memory.oom.group=1
# Podman 5.8: pass via --cgroup-conf flag
PodmanArgs=--cgroup-conf=memory.swap.max=0 --cgroup-conf=memory.high=6300000000 --cgroup-conf=memory.oom.group=1

[Service]
MemoryHigh=6300M
MemorySwapMax=0
TimeoutStopSec=220
TimeoutStartSec=900
CPUWeight=200
